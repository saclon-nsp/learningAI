<div class="dashboard-container">
  <nav class="dashboard-nav">
    <div class="logo">🚀 LearningAI</div>
    <div class="actions">
      <span class="user">Hello, {{ currentUser()?.fullName || currentUser()?.username }}</span>
      <button (click)="logout()" class="logout">Logout</button>
    </div>
  </nav>

  <main class="dashboard-main">
    <header class="dashboard-header">
      <h1>Dashboard</h1>
      <p>Overview of your account and quick actions</p>
    </header>

    <section class="cards">
      <div class="card">
        <h3>Quick Start</h3>
        <p>Get started with learning modules and tutorials.</p>
      </div>
      <div class="card">
        <h3>Recent Activity</h3>
        <p>View your recent progress and scores.</p>
      </div>
      <div class="card">
        <h3>Profile</h3>
        <p>Update profile and account settings.</p>
      </div>
    </section>
  </main>
</div>
