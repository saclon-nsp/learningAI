<div class="signup-container">
  <div class="signup-card">
    <!-- <div class="signup-header">
      <h1>Create Account</h1>
      <p>Join us today and get started</p>
    </div> -->

    <div class="signup-header">
      <div class="signup-brand">
        <div class="signup-brand-logo">SL</div>

        <div class="signup-brand-copy">
          <h1>Unlock Your Potential</h1>
          <p>Join SacLon and unlock a smarter digital experience.</p>
        </div>
      </div>
    </div>

    <form (ngSubmit)="signup()" class="signup-form" novalidate>
      <!-- Full Name Input -->
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input
          type="text"
          id="fullName"
          [(ngModel)]="fullName"
          name="fullName"
          placeholder="Enter your full name"
          class="form-input"
          required
          [disabled]="isLoading"
        />
      </div>

      <!-- Email Input -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email"
          class="form-input"
          required
          [disabled]="isLoading"
        />
      </div>

      <!-- Password Input -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          (change)="onPasswordChange()"
          placeholder="Create a password"
          class="form-input"
          required
          [disabled]="isLoading"
        />
        <div class="password-strength">
          <div class="strength-bar">
            <div 
              class="strength-fill"
              [style.width.%]="(passwordStrength / 4) * 100"
              [style.backgroundColor]="getPasswordStrengthColor()"
            ></div>
          </div>
          <span class="strength-text" [style.color]="getPasswordStrengthColor()">
            {{ getPasswordStrengthLabel() }}
          </span>
        </div>
        <small>Password must be at least 6 characters</small>
      </div>

      <!-- Confirm Password Input -->
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Confirm your password"
          class="form-input"
          required
          [disabled]="isLoading"
        />
      </div>

      <!-- Terms and Conditions -->
      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input
            type="checkbox"
            [(ngModel)]="agreeToTerms"
            name="agreeToTerms"
            [disabled]="isLoading"
          />
          <span>I agree to the <a href="#" class="link">Terms and Conditions</a></span>
        </label>
      </div>

      <!-- Messages -->
      <div *ngIf="errorMessage" class="error-message">
        <span>⚠️</span> {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="success-message">
        <span>✓</span> {{ successMessage }}
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="signup-btn"
        [disabled]="isLoading"
      >
        <span *ngIf="isLoading" class="loader"></span>
        {{ isLoading ? 'Creating Account...' : 'Sign Up' }}
      </button>
    </form>

    <!-- Login Link -->
    <div class="login-link">
      <p>Already have an account? <a (click)="goToLogin()" class="link">Sign in</a></p>
    </div>
  </div>

  <div class="signup-illustration">
    <div class="illustration-content">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
      <div class="circle circle-3"></div>
    </div>
  </div>
</div>
